<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <h2>More Informative Nexus Requirements</h2>
  <div id="enabled-mods-container">
    <p>Show Enabled Mods</p>
    <label class="switch">
      <input type="checkbox" checked>
      <span class="slider round"></span>
    </label>
  </div>
  <div id="uninstalled-mods-container">
    <p>Show Uninstalled Mods</p>
    <label class="switch">
      <input type="checkbox" id="uninstalledCheckbox" checked>
      <span class="slider round"></span>
    </label>
  </div>
  <div id="api-key-container">
    <label for="apiKey">Nexus Mods API Key:</label>
    <input type="password" id="apiKey" placeholder="Enter your API key">
  </div>
  <div id="tracked-mods-container">
    <p>Show Tracked Mods</p>
    <label class="switch">
      <input type="checkbox" id="trackedCheckbox" checked>
      <span class="slider round"></span>
    </label>
  </div>
  <div id="endorsed-mods-container">
    <p>Show Endorsed Mods</p>
    <label class="switch">
      <input type="checkbox" id="endorsedCheckbox" checked>
      <span class="slider round"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>

</html>
